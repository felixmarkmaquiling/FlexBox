<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexibleBox</title>


</head>
<body>

    <style>

        header {
            font-size: x-large;
            font-style: italic;
        }

        .container{
            width: 500px;
            height: 250px;
            border: 2px solid black;
            background-color:azure;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .box{
            border: 1px solid black;
            background-color:aqua;
            border-radius: 20%;
            padding: 20px;
            width: 10%;
            height: 15%;
        }

    </style>

</head>
<body>

    <header>FlexBox</header>
    <br>

    <div class="container">

    <div class="box">A</div>
    <div class="box">B</div>
    <div class="box">C</div>

    </div>

    
</body>
</html>
